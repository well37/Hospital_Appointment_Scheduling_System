{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="mb-4">Create Account</h2>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input class="form-control" name="first_name" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input class="form-control" name="last_name" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Date of Birth</label>
                            <input class="form-control" type="date" name="date_of_birth" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Gender</label>
                            <select class="form-select" name="gender">
                                <option value="">Select</option>
                                <option value="Female">Female</option>
                                <option value="Male">Male</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Preferred Language</label>
                            <input class="form-control" name="preferred_language">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input class="form-control" name="phone">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input class="form-control" type="email" name="email">
                        </div>

                        <div class="col-md-8">
                            <label class="form-label">Address</label>
                            <input class="form-control" name="address">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Birth Country</label>
                            <input class="form-control" name="birth_country">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input class="form-control" name="username" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input class="form-control" type="password" name="password" required>
                        </div>
                    </div>

                    <button class="btn btn-primary mt-4" type="submit">Create Account</button>
                </form>

                <p class="text-muted mt-3 mb-0">
                    Already have an account? <a href="{{ url_for('login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
